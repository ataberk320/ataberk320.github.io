<!DOCTYPE html>
<html>
<head>
  <title>ataberk320(Ataberk Aybak)'s website</title>
  <link rel="icon" type="image/png" href=siteicon.png>
  <link href="https://fonts.googleapis.com/css2?family=Droid+Sans&display=swap" rel="stylesheet">
  <style>
    body, html { margin: 0; padding: 0; height: 100%; font-family: 'Droid Sans', sans-serif; background: #2c3e50; overflow: hidden; color: white}
    #navbar { height: 50px; background: linear-gradient(to bottom, #333333, #000000); display: flex; align-items: center; gap: 8px; }
    .nav-item { cursor: pointer; display: flex; align-items: center; gap: 8px; }
    #desktop { height: calc(100vh - 90px); background: url("wallpaper.jpg"); background-size: cover; background-position: center; background-repeat: no-repeat; position: relative; padding: 10px }
    #taskbar { position: fixed; bottom: 0; width: 100%; height: 40px; background: #7f8c8d; color: white; display: flex; align-items: center; padding: 0 10px; box-sizing: border-box; font-size: 14px; }
    .window { position: absolute; width: 300px; height: 200px; background: white; border: 1px solid #ccc; box-shadow: 2px 2px 10px rgba(0,0,0,0.3); border-radius: 1px; display: flex; flex-direction: column; color: black; }
    .win-header { background: #eee; padding: 5px 10px; display: flex; justify-content: space-between; cursor: move; }
  </style>
</head>
<body>
  <div id="navbar">
    <div class="nav-item" onclick="openWindow('About', 'AutumnOS is a RISC-V based operating system built from the ground up, featuring a custom display server, a proprietary socket structure, and a lightweight multitasking architecture. The system leverages an ampersand-based (&) job control mechanism to handle concurrent tasks efficiently.', 'siteicon.png')">About</div>
    <div class="nav-item" onclick="openWindow('Releases', 'Coming soon.', 'siteicon.png')">Releases</div>
    <div class="nav-item" onclick="openWindow('Autumn Store', 'Coming soon.', 'siteicon.png')">Autumn Store</div>
  </div>
  <div id="desktop"></div>
  
  <div id="taskbar">Start</div>

  <script>
      function makeDraggable(win) {
        const header = win.querySelector('.win-header');
        let isDragging = false;
        let offsetX, offsetY;

        header.onmousedown = (e) => {
          isDragging = true;
          offsetX = e.clientX - win.offsetLeft;
          offsetY = e.clientY - win.offsetTop;
          win.style.zIndex = 1000;
        };

        document.onmousemove = (e) => {
          if (isDragging) {
                win.style.left = (e.clientX - offsetX) + 'px';
                win.style.top = (e.clientY - offsetY) + 'px';
          }
        }

        document.onmouseup = () => isDragging = false;
      }
      function openWindow(name, content, iconSrc) {
        const desktop = document.getElementById('desktop');
        const taskbar = document.getElementById('taskbar');
        const iconHTML = iconSrc.startsWith('http') 
        ? `<img src="${iconSrc}" width="16" height="16" style="vertical-align:middle; margin-right:5px;">` 
        : `<span style="margin-right:5px;">${iconSrc}</span>`;
        const win = document.createElement('div');
        win.className = 'window';
        win.style.top = '20px';
        win.style.left = '20px';
        
        win.innerHTML = `
        <div class="win-header">
            <span>${iconHTML} <strong>${name}</strong></span>
            <button class="close-btn">X</button>
        </div>
        <div style="padding: 10px; color: black;">${content}</div>
    `;
            
        desktop.appendChild(win);
        makeDraggable(win);
        const btn = document.createElement('div');
        btn.className = 'taskbar-item';
        btn.style.padding = "5px 10px";
        btn.style.background = "#555";
        btn.style.cursor = "pointer";
        btn.innerText = name;
        btn.innerHTML =  `${iconHTML} ${name}`
        btn.onclick = () => {
          win.style.display = (win.style.display === 'none') ? 'flex' : 'none';
        };
        taskbar.appendChild(btn);
        win.querySelector('.close-btn').onclick = () => {
          win.remove();
          btn.remove();
       };
  }
  window.onload = function() {
        openWindow('Welcome!', 'Welcome to ataberk320s website!', 'siteicon.png');
  };
  </script>

  
</body>
</html>
